<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="container">
                <div class="nav-wrapper">
                    <div class="logo"><h1>📚 Bán Sách</h1></div>
                    <ul class="nav-menu">
                        <li><a href="../index.html" class="nav-link">Trang chủ</a></li>
                        <li><a href="san-pham.html" class="nav-link">Sản phẩm</a></li>
                        <li><a href="gioi-thieu.html" class="nav-link">Giới thiệu</a></li>
                        <li><a href="lien-he.html" class="nav-link">Liên hệ</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <div class="container" style="max-width:720px;">
            <section style="background:white; padding:2rem; border-radius:10px;">
                <h2 style="color:var(--primary-color); margin-bottom:1rem;">Đăng ký tài khoản</h2>
                <p style="color:var(--text-light); margin-bottom:1rem;">Tạo tài khoản để theo dõi đơn hàng và quản lý giỏ hàng.</p>

                <form id="registerForm" onsubmit="registerUser(event)">
                    <div class="form-group">
                        <label>Họ và tên</label>
                        <input type="text" id="regName" required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required>
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="regPassword" minlength="6" required>
                    </div>

                    <div class="form-group">
                        <label>Xác nhận mật khẩu</label>
                        <input type="password" id="regPasswordConfirm" minlength="6" required>
                    </div>

                    <button type="submit" class="btn-primary">Đăng ký</button>
                </form>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container"><div class="footer-bottom"><p>&copy; 2024 Bán Sách Lịch Sử Việt Nam</p></div></div>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
